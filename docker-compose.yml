version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: invoice_db
    environment:
      POSTGRES_DB: invoice_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - invoice_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    networks:
      - invoice_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice_frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - invoice_network

volumes:
  db_data:

networks:
  invoice_network:
    driver: bridge